# Root & Fruit — Cloud Build CI/CD Pipeline
# Triggered on push to main branch

substitutions:
  _REGION: us-east1
  _REPO: root-and-fruit
  _PROJECT: root-and-fruit-app

steps:
  # ── 1. Build backend image ───────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: build-backend
    args:
      - build
      - -t
      - '${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/backend:${SHORT_SHA}'
      - -t
      - '${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/backend:latest'
      - ./backend
    waitFor: ['-']

  # ── 2. Push backend image ────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: push-backend
    args:
      - push
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/backend'
    waitFor: ['build-backend']

  # ── 3. Deploy backend to Cloud Run ──────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-backend
    entrypoint: gcloud
    args:
      - run
      - deploy
      - root-and-fruit-backend
      - '--image=${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/backend:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-secrets=ANTHROPIC_API_KEY=anthropic-api-key:latest'
      - '--set-env-vars=NODE_ENV=production,APP_VERSION=${SHORT_SHA}'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--timeout=600'
      - '--concurrency=80'
    waitFor: ['push-backend']

  # ── 4. Get backend URL ───────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: get-backend-url
    entrypoint: bash
    args:
      - '-c'
      - |
        BACKEND_URL=$(gcloud run services describe root-and-fruit-backend \
          --region=${_REGION} \
          --format='value(status.url)')
        echo "BACKEND_URL=$${BACKEND_URL}" > /workspace/backend_url.env
        echo "Backend URL: $${BACKEND_URL}"
    waitFor: ['deploy-backend']

  # ── 5. Build frontend image (with backend URL baked in) ──────────
  - name: 'gcr.io/cloud-builders/docker'
    id: build-frontend
    entrypoint: bash
    args:
      - '-c'
      - |
        source /workspace/backend_url.env
        docker build \
          --build-arg BACKEND_URL="$${BACKEND_URL}" \
          -t ${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/frontend:${SHORT_SHA} \
          -t ${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/frontend:latest \
          ./frontend
    waitFor: ['get-backend-url']

  # ── 6. Push frontend image ───────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: push-frontend
    args:
      - push
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/frontend'
    waitFor: ['build-frontend']

  # ── 7. Deploy frontend to Cloud Run ─────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-frontend
    entrypoint: bash
    args:
      - '-c'
      - |
        source /workspace/backend_url.env
        gcloud run deploy root-and-fruit-frontend \
          --image=${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/frontend:${SHORT_SHA} \
          --region=${_REGION} \
          --platform=managed \
          --allow-unauthenticated \
          --set-env-vars="BACKEND_URL=$${BACKEND_URL},NODE_ENV=production,APP_VERSION=${SHORT_SHA}" \
          --memory=256Mi \
          --cpu=1 \
          --min-instances=0 \
          --max-instances=5 \
          --concurrency=200
    waitFor: ['push-frontend']

images:
  - '${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/backend:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/frontend:${SHORT_SHA}'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'